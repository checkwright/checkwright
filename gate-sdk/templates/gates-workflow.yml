# gate-sdk CI backstop — the server-side enforcement tier (gate-sdk/SPEC.md
# §Enforcement tiers). The local pre-commit hook is opt-in and bypassable by
# design (`git commit --no-verify`, or a clone that never ran install-hooks.sh);
# this workflow is the authoritative outer backstop that closes both gaps on
# every push and pull request.
#
# Scope boundary: consumer-owned CI stops *bypass* — it cannot stop an agent
# editing this workflow itself in the same change. A tamper-proof verifier
# (verifier neutrality) is the deferred hosted-attestation-service rung, out of
# scope here rather than overclaimed.
#
# Copied out like every gate-sdk template. Checkout + bash only: no caching, no
# matrix, no third-party actions, so the surface an agent could tamper with
# stays minimal and reviewable. To adopt: copy to .github/workflows/gates.yml,
# set your default-branch name below, add a step per non-gate-tests runner
# (guard tests, a language test suite) after the derived fixture step, and
# require this workflow's status check before merge (branch-protection recipe:
# the install-page docs). The fixture suites need no hand-list — they derive
# from your gate-tests dirs (gate_fixture_suites). A filled example is this
# repo's own .github/workflows/gates.yml.
name: gates

on:
  push:
    branches: [main]           # set to your default branch (e.g. master)
  pull_request:
    branches: [main]           # set to your default branch (e.g. master)

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — history-reading gates (e.g. drift-kit's trajectory
      # extractor) need the full commit graph, not a shallow checkout.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: full battery
        run: bash gate-sdk/bin/run-gates.sh
      # Every dir with a gate-tests/ tree, run against its sibling checks/ — no
      # hand-list to drift as kits are added or renamed.
      - name: fixture suites (derived from */gate-tests)
        run: |
          source gate-sdk/lib/gate.sh
          rc=0
          while IFS=$'\t' read -r suite tests checks; do
            echo "== $suite =="
            # shellcheck disable=SC2086  # empty checks expands to no arg by design
            bash gate-sdk/bin/run-gate-tests.sh "$tests" $checks || rc=1
          done < <(gate_fixture_suites)
          exit $rc
      # PLACEHOLDER — add one step per non-gate-tests runner your CLAUDE.md
      # names (a guard-test runner, a language test suite), e.g.
      #   - name: guard-kit decision table
      #     run: bash guard-kit/bin/run-guard-tests.sh
