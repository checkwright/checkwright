# Filled instance of gate-sdk/templates/gates-workflow.yml — this repo's CI
# backstop. The full battery plus every fixture runner CLAUDE.md's battery list
# names, checkout + bash only. Scope + neutrality boundary: see the template
# header and gate-sdk/SPEC.md §Enforcement tiers.
name: gates

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: full battery
        run: bash gate-sdk/bin/run-gates.sh
      - name: gate-sdk fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh gate-sdk/gate-tests gate-sdk/checks
      - name: lifecycle-kit fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh lifecycle-kit/gate-tests lifecycle-kit/checks
      - name: queue-kit fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh queue-kit/gate-tests queue-kit/checks
      - name: spec-kit fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh spec-kit/gate-tests spec-kit/checks
      - name: delegation-kit fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh delegation-kit/gate-tests delegation-kit/checks
      - name: context-kit fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh context-kit/gate-tests context-kit/checks
      - name: evidence-kit fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh evidence-kit/gate-tests evidence-kit/checks
      - name: consumer-gate fixtures
        run: bash gate-sdk/bin/run-gate-tests.sh scripts/gate-tests
      - name: guard-kit decision table
        run: bash guard-kit/bin/run-guard-tests.sh
