# Filled instance of gate-sdk/templates/gates-workflow.yml — this repo's CI
# backstop. The full battery, then the fixture suites derived from the
# gate-tests dirs on disk (gate_fixture_suites — no hand-list to drift from
# CLAUDE.md's battery), then the non-gate-tests runners. Checkout + bash only.
# Scope + neutrality boundary: see the template header and gate-sdk/SPEC.md
# §Enforcement tiers.
name: gates

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — check-trajectory-fresh reads the full commit graph.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # This repo registers check-docs-render-fidelity, whose oracle renders each
      # docs page through ruby's kramdown GFM parser (site-kit/SPEC.md
      # §check-docs-render-fidelity). The runner ships ruby but not the gem, so
      # provision it into the system ruby the gate's bare `ruby` resolves. Stays
      # a bash `run:` (no setup-ruby action) to keep the checkout+bash tamper
      # floor; rides this filled instance, not the generic template, because the
      # dependency joins the toolchain only for a consumer that registers the gate.
      - name: render-fidelity gate deps (kramdown GFM parser)
        run: sudo gem install --no-document kramdown-parser-gfm
      - name: full battery
        run: bash gate-sdk/bin/run-gates.sh
      - name: fixture suites (derived from */gate-tests)
        run: |
          source gate-sdk/lib/gate.sh
          rc=0
          while IFS=$'\t' read -r suite tests checks; do
            echo "== $suite =="
            # shellcheck disable=SC2086  # empty checks expands to no arg by design
            bash gate-sdk/bin/run-gate-tests.sh "$tests" $checks || rc=1
          done < <(gate_fixture_suites)
          exit $rc
      - name: guard-kit decision table
        run: bash guard-kit/bin/run-guard-tests.sh
