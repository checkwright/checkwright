# Checkwright identity manifest — gate-sdk/SPEC.md §check-identity.
# check-identity asserts every line below matches this clone's local git
# identity, so a wrong-account commit or wrong-SSH-key push fails loudly at
# commit time (and once at install-hooks opt-in) instead of silently
# misattributing. Verification only; the mapping stays git's job (includeIf,
# core.sshCommand). Format: 'key value…', '#' comments and blanks ignored.

# The maintainer commit identity (already public in this repo's git history).
email vasyl.tretiakov@gmail.com

# The push identity: origin must resolve to the github.com host.
remote-host origin github.com
