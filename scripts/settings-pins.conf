# Checkwright settings pins — context-kit/SPEC.md §check-settings-pins.
# check-settings-pins asserts every line below holds against the tracked
# harness settings file (.claude/settings.json), so a memory-re-enabling edit
# fails loudly at commit time. General mechanism: any settings key is pinnable;
# this repo's first pins hold the auto-memory-disabling keys (the no-per-user-
# memory doctrine — context-kit/SPEC.md §The memory-off doctrine).
# Format: '<jq path> = <expected JSON>', '#' comments and blanks ignored.

.autoMemoryEnabled = false
.env.CLAUDE_CODE_DISABLE_AUTO_MEMORY = "1"
